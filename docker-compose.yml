version: "3.9"

# ─────────────────────────────────────────────────────────
# LandVerify — Local Development Stack
# Usage: docker compose up -d
# All services start in one command. Any new team member
# gets a running environment without manual setup.
# ─────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: landverify-postgres
    environment:
      POSTGRES_USER: landverify
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: landverify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landverify"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: landverify-redis
    command: redis-server --requirepass localdev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: landverify-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://landverify:localdev@postgres:5432/landverify
      REDIS_URL: redis://:localdev@redis:6379
      PAYSTACK_SECRET_KEY: sk_test_d1223447a803bb137862715c653ddccaab4bf85a
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── Next.js Frontend ────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: landverify-web
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    command: npm run dev
    restart: unless-stopped

  # ── Nginx (reverse proxy) ───────────────────────────────
  # In prod this is replaced by Cloudflare + your hosting provider.
  # Locally it mimics the production routing.
  nginx:
    image: nginx:alpine
    container_name: landverify-nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - web
    profiles:
      - proxy  # only starts with: docker compose --profile proxy up

volumes:
  postgres_data:
  redis_data:
